name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Grant gradlew execute permission
        run: chmod +x gradlew

      - name: Spotless check
        run: ./gradlew spotlessCheck

      - name: Compile
        run: ./gradlew compileJava compileTestJava

      - name: Test
        run: ./gradlew test

      - name: Build
        run: ./gradlew build -x test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            build/reports/tests/test/
            build/test-results/test/
          retention-days: 14

  lint-docs:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Markdown lint
        run: |
          npm install -g markdownlint-cli2@0.22.0
          markdownlint-cli2 "**/*.md" "#build" "#.gradle"

      - name: YAML lint
        run: pip install yamllint==1.38.0 && yamllint .
