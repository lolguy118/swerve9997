name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write  # for JaCoCo PR coverage comment
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Grant gradlew execute permission
        run: chmod +x gradlew

      - name: Spotless check
        run: ./gradlew spotlessCheck

      - name: Compile
        run: ./gradlew compileJava compileTestJava

      - name: Test
        run: ./gradlew test

      - name: Javadoc
        run: ./gradlew javadoc

      - name: Build
        run: ./gradlew build -x test

      - name: Coverage report
        if: always()
        run: ./gradlew jacocoTestReport

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            build/reports/tests/test/
            build/test-results/test/
          retention-days: 14

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: |
            build/reports/jacoco/test/
            build/reports/jacoco/test/jacocoTestReport.xml
          retention-days: 14

      - name: Upload SpotBugs report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-report
          path: build/reports/spotbugs/
          retention-days: 14

      - name: Upload Checkstyle report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-report
          path: build/reports/checkstyle/
          retention-days: 14

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.7.1
        with:
          paths: build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 0
          min-coverage-changed-files: 0
          title: JaCoCo Coverage
          update-comment: true

  lint-docs:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install markdown + YAML linters
        run: |
          npm install -g markdownlint-cli2@0.22.0
          pip install yamllint==1.38.0

      - name: Markdown lint
        run: markdownlint-cli2 "**/*.md" "#build" "#.gradle"

      - name: YAML lint
        run: yamllint .

      - name: Docs verification sweep
        run: bash .claude/hooks/verify-docs.sh

      - name: JSON lint (strict parse)
        run: |
          FAIL=0
          while IFS= read -r f; do
            if ! err=$(node -e "JSON.parse(require('fs').readFileSync(process.argv[1],'utf8'))" "$f" 2>&1); then
              echo "::error file=$f::$err"
              FAIL=1
            fi
          done < <(git ls-files '*.json' ':!.vscode/')
          exit $FAIL

  shellcheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck on .claude/hooks
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: .claude/hooks
          severity: warning

  design-drift:
    # Runs the three advisory hook scripts on the PR's changed files so
    # contributors who bypass local hooks still get checked.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect changed files
        id: diff
        run: |
          git diff --name-only \
            "origin/${{ github.base_ref }}...HEAD" > changed.txt
          echo "Changed files:"
          cat changed.txt || true

      - name: check-doc-tunables (gating)
        run: |
          fail=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            [ -f "$f" ] || continue
            export TOOL_INPUT="{\"file_path\":\"$PWD/$f\"}"
            out=$(bash .claude/hooks/check-doc-tunables.sh || true)
            if [ -n "$out" ]; then
              echo "$out"
              fail=1
            fi
          done < changed.txt
          exit $fail

      - name: check-deleted-class-refs (gating)
        run: |
          fail=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            [ -f "$f" ] || continue
            export TOOL_INPUT="{\"file_path\":\"$PWD/$f\"}"
            out=$(bash .claude/hooks/check-deleted-class-refs.sh || true)
            if [ -n "$out" ]; then
              echo "$out"
              fail=1
            fi
          done < changed.txt
          exit $fail

      - name: check-design-drift (advisory)
        run: |
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            [ -f "$f" ] || continue
            export TOOL_INPUT="{\"file_path\":\"$PWD/$f\"}"
            bash .claude/hooks/check-design-drift.sh || true
          done < changed.txt
