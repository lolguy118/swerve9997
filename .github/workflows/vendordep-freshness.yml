name: Vendordep Freshness

on:
  schedule:
    # Mondays 13:00 UTC (09:00 America/New_York EDT, 08:00 EST)
    - cron: '0 13 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compare local vs upstream vendordep versions
        id: check
        run: |
          python3 - <<'PY'
          import json, os, sys, urllib.request
          from pathlib import Path

          behind = []
          unreachable = []
          for f in sorted(Path('vendordeps').glob('*.json')):
              data = json.loads(f.read_text(encoding='utf-8'))
              name = data.get('name', f.name)
              local_ver = data.get('version', '?')
              url = data.get('jsonUrl', '').strip()
              if not url:
                  continue  # e.g. WPILib-bundled vendordeps have no jsonUrl
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'team271-lib-ci'})
                  with urllib.request.urlopen(req, timeout=30) as r:
                      upstream = json.loads(r.read().decode('utf-8'))
                  up_ver = upstream.get('version', '?')
                  if up_ver != local_ver:
                      behind.append((name, local_ver, up_ver, url))
              except Exception as e:
                  unreachable.append((name, local_ver, url, str(e)))

          lines = []
          if behind:
              lines.append('### Vendordeps behind upstream')
              lines.append('')
              lines.append('| Vendordep | Local | Upstream | jsonUrl |')
              lines.append('| --------- | ----- | -------- | ------- |')
              for n, lv, uv, u in behind:
                  lines.append(f'| {n} | `{lv}` | `{uv}` | <{u}> |')
              lines.append('')
          if unreachable:
              lines.append('### Vendordeps unreachable (CI could not fetch)')
              lines.append('')
              for n, lv, u, err in unreachable:
                  lines.append(f'- **{n}** `{lv}` — {u} — {err}')
              lines.append('')

          body = '\n'.join(lines) if lines else ''
          out_path = os.environ['GITHUB_OUTPUT']
          has_findings = 'true' if lines else 'false'
          with open(out_path, 'a', encoding='utf-8') as out:
              out.write(f'has_findings={has_findings}\n')
          Path('vendordep-freshness.md').write_text(body, encoding='utf-8')
          print(body if body else 'All vendordeps at upstream version.')
          PY

      - name: Open or update tracking issue
        if: steps.check.outputs.has_findings == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('vendordep-freshness.md', 'utf8');
            const title = 'Vendordep freshness check';
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'vendordeps',
              per_page: 100,
            });
            const match = existing.find(i => i.title === title);
            const fullBody = `${body}\n\n_Generated by \`.github/workflows/vendordep-freshness.yml\` on ${new Date().toISOString()}._`;
            if (match) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body: fullBody,
              });
              core.info(`Updated #${match.number}`);
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: fullBody,
                labels: ['vendordeps'],
              });
              core.info('Created new tracking issue');
            }
